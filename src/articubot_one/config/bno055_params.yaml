bno055:
  ros__parameters:
    ros_topic_prefix: "imu/"
    connection_type: "i2c"
    i2c_bus: 1
    i2c_addr: 0x28
    data_query_frequency: 100
    calib_status_frequency: 0.1
    frame_id: "imu_link"
    operation_mode: 0x0C  # NDOF — full sensor fusion mode
    placement_axis_remap: "P1"  # default mounting orientation
    acc_factor: 100.0
    mag_factor: 16000000.0
    gyr_factor: 900.0
    grav_factor: 100.0
    set_offsets: false
